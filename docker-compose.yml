services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/src:/app/src
      - ./output:/app/output

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A hpe.orchestrator.worker worker -l info
    env_file: backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./output:/app/output

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hpe
      POSTGRES_USER: hpe
      POSTGRES_PASSWORD: hpe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"

volumes:
  pgdata:
  miniodata:
