# Handles Upgrade header for WebSocket connections
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── WebSocket proxy (must precede /api and catch-all) ──────────────────
    location /ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # ── API v1 (prefix /api/) ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host         $host;
        proxy_set_header   X-Real-IP    $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── API v2 direct routes (no /api/ prefix) ────────────────────────────
    # Matches paths starting with known API prefixes (no /api/ needed).
    location ~ ^/(health|docs|openapi\.json|redoc|sizing|volute|pipeline|assistant|surrogate|geometry|optimize|analyze|curves|auth|batch|noise|report|version|inverse|blade|domain|blockage|ansys|lean-sweep|mri|turbo|lete|rrs|template|db|convergence|udp|cfd) {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host         $host;
        proxy_set_header   X-Real-IP    $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade      $http_upgrade;
        proxy_set_header   Connection   $connection_upgrade;
        proxy_read_timeout 300s;
    }

    # ── SPA catch-all (React Router) ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
