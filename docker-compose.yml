version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: higra123
      POSTGRES_DB: db_pump_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/hpe/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=higra123
      - DB_NAME=db_pump_engine
      - SECRET_KEY=hpe-docker-secret
    depends_on:
      - db
    volumes:
      - ./backend/src:/app/backend/src
    command: uvicorn hpe.api.app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  pgdata:
